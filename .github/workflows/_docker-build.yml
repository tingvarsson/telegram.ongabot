name: Docker Build

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to check out (empty = workflow default)
        required: false
        type: string
        default: ""
      tags:
        description: Newline-separated list of image tags to apply
        required: true
        type: string
      push:
        description: Whether to push the image to Docker Hub
        required: false
        type: boolean
        default: true
      version:
        description: OCI version label (e.g. "1.0.2" for release, "1.0.2-abc1234" for edge)
        required: false
        type: string
        default: ""
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Get commit SHA
        id: commit
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ github.repository }}
          labels: |
            org.opencontainers.image.title=ONGAbot
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.revision=${{ steps.commit.outputs.sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        if: inputs.push
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: ${{ inputs.push }}
          tags: ${{ inputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
